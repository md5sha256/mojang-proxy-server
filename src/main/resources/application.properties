# server hostname / port
server.port = 8000
server.address = 0.0.0.0

# Disable spring cache
spring.cache.type=NONE

# Persistent L2 profile cache (SQLite). journal_mode=WAL lets reads and the
# single writer proceed concurrently; busy_timeout avoids spurious SQLITE_BUSY.
spring.datasource.url=jdbc:sqlite:${cache.db.path:./cache.db}?journal_mode=WAL&busy_timeout=5000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.pool-name=sqlite-l2-pool
spring.datasource.hikari.maximum-pool-size=4

# Idempotent schema creation (SQLite is treated as non-embedded, so init must be forced on).
spring.sql.init.mode=always

# How often expired rows are purged from the L2 store.
cache.cleanup-interval-ms=3600000